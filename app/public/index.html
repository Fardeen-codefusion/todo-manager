<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Manager</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>To-Do Task Manager</h1>
      <p class="subtitle">A simple production-style task management app</p>
    </div>
    <div class="status-box">
      <span id="envBadge">Loading...</span>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Create Task</h2>
      <form id="taskForm">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" placeholder="Enter task title" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Enter task description"></textarea>

        <label for="priority">Priority</label>
        <select id="priority" name="priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>

        <button type="submit">Add Task</button>
      </form>
    </section>

    <section class="card">
      <div class="task-header">
        <h2>Task List</h2>
        <button id="refreshBtn" type="button" class="secondary-btn">Refresh</button>
      </div>
      <div id="messageBox"></div>
      <div id="taskList" class="task-list"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
